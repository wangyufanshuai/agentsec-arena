services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentsec
      POSTGRES_USER: agentsec
      POSTGRES_PASSWORD: agentsec
    ports:
      - "54329:5432"
    volumes:
      - agentsec_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63799:6379"

  api:
    build:
      context: ../../apps/api
    environment:
      AGENTSEC_DATABASE_URL: postgresql://agentsec:agentsec@postgres:5432/agentsec
      AGENTSEC_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  agentsec_postgres:

